name: surgitrack

description: SurgiTrack - Cardiothoracic Surgery Logbook and Training Portfolio

publish_to: 'none'

version: 1.0.0+1


environment:
  sdk: ">=3.12.2 <4.0.0"


dependencies:

  flutter:
    sdk: flutter


  # State Management
  flutter_riverpod: ^2.6.1


  # Navigation
  go_router: ^16.0.0


  # Database
  drift: ^2.28.1
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.39


  # File paths/storage
  path_provider: ^2.1.5
  path: ^1.9.1


  # Charts
  fl_chart: ^1.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  equatable: ^2.0.7
  shared_preferences: ^2.5.3


  # Media / Attachments
  image_picker: ^1.2.0
  file_picker: ^10.3.2
  open_filex: ^4.7.0


  # UI
  flutter_svg: ^2.2.0
  google_fonts: ^6.3.1

  cupertino_icons: ^1.0.8
  drift_flutter: ^0.2.8



dev_dependencies:

  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


  # Drift Code Generation
  drift_dev: ^2.28.1
  build_runner: ^2.7.1



flutter:

  uses-material-design: true


  assets:
    - assets/
    - assets/procedures/
    - assets/icons/
    - assets/images/